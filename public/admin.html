<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-black text-yellow-500 p-10">
    <h1 class="text-2xl border-b border-yellow-500 mb-10">🛡️ CONTROL PANEL</h1>
    <div class="space-y-4">
        <button onclick="set('Red')" class="w-full bg-red-700 text-white p-4 rounded">FORCE RED WIN</button>
        <button onclick="set('Green')" class="w-full bg-green-700 text-white p-4 rounded">FORCE GREEN WIN</button>
    </div>
    <script>
        function set(c) {
            fetch('/api/admin/set-result', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({color: c})
            }).then(() => alert("Agla Result " + c + " Fixed!"));
        }
    </script>
</body>
</html>
